<div class="dashboard-container container">

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card glass-panel gradient-1">
            <div class="stat-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="stat-details">
                <h3>Total Expenses</h3>
                <h2>${{ totalExpenses || 0 | number:'1.2-2' }}</h2>
            </div>
        </div>

        <div class="stat-card glass-panel gradient-2">
            <div class="stat-icon">
                <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="stat-details">
                <h3>Monthly Expenses</h3>
                <h2>${{ monthlyExpenses || 0 | number:'1.2-2' }}</h2>
            </div>
        </div>
    </div>


    <!-- DATE FILTER -->
    <div class="glass-panel filter-panel">
        <h3 class="panel-title">
            <i class="fas fa-filter"></i> Filter by Date
        </h3>

        <div class="filter-controls">
            <input
                type="date"
                [(ngModel)]="selectedDate"
                (change)="filterByDate()"
                class="form-control">

            <button class="btn btn-secondary" (click)="clearDateFilter()">
                Clear
            </button>
        </div>
    </div>


    <!-- Main Grid -->
    <div class="content-grid">

        <!-- Expense Form -->
        <div class="glass-panel">
            <h3 class="panel-title">
                <i class="fas fa-plus-circle"></i>
                {{ selectedExpense ? 'Edit Expense' : 'Add New Expense' }}
            </h3>

            <app-expense-form
                [expense]="selectedExpense"
                (expenseAdded)="onExpenseAdded()"
                (expenseUpdated)="onExpenseUpdated()">
            </app-expense-form>
        </div>


        <!-- Chart -->
        <div class="glass-panel">
            <h3 class="panel-title">
                <i class="fas fa-chart-pie"></i> Expenses by Category
            </h3>

            <div class="chart-container" *ngIf="filteredExpenses && filteredExpenses.length > 0; else noChartData">
                <canvas
                    baseChart
                    [datasets]="pieChartDatasets"
                    [labels]="pieChartLabels"
                    [options]="pieChartOptions"
                    [legend]="pieChartLegend"
                    type="pie">
                </canvas>
            </div>

            <ng-template #noChartData>
                <div class="empty-state">
                    No data to display.
                </div>
            </ng-template>
        </div>

    </div>


    <!-- Expense List -->
    <div class="glass-panel summary-panel">
        <h3 class="panel-title">
            <i class="fas fa-list"></i> Recent Transactions
        </h3>

        <app-expense-list
            [expenses]="filteredExpenses"
            (expenseDeleted)="onExpenseDeleted($event)"
            (expenseEdit)="onEditExpense($event)">
        </app-expense-list>
    </div>

</div>
