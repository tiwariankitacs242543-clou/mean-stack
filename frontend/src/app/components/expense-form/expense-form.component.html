<form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="expense-form">
    <div class="form-row">
        <div class="form-group">
            <label>Title</label>
            <input type="text" formControlName="title" placeholder="e.g., Grocery">
        </div>
        <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" formControlName="amount" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Category</label>
            <select formControlName="category">
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" formControlName="date">
        </div>
    </div>

    <div class="form-group">
        <label>Notes (Optional)</label>
        <textarea formControlName="description" rows="2" placeholder="Add some details..."></textarea>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="expenseForm.invalid || isLoading">

    <span *ngIf="!isLoading">

        <i class="fas" 
           [ngClass]="editingExpenseId ? 'fa-edit' : 'fa-plus'"></i>

        {{ editingExpenseId ? 'Update Expense' : 'Add Expense' }}

    </span>

    <span *ngIf="isLoading" class="spinner"></span>

</button>
